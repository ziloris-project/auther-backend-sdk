# Release the Node SDK to npm via OIDC Trusted Publishing — no token
# (npm classic tokens were revoked in Dec 2025).
#
# Model (single package per language, so no changesets): the version in
# node/package.json is the source of truth. On every push to main that
# touches node/**, this workflow builds and — if that exact version is
# not already on the registry — publishes it with sigstore provenance.
#
# So a release is: bump node/package.json version in a PR, merge it. A
# merge that doesn't change the version republishes nothing (npm view
# finds it and the step skips). No `npm publish` ever runs from a laptop.
#
# Auth: npm OIDC Trusted Publishing. NO secret token. @auther-sdk/node
# must have a Trusted Publisher configured on npmjs.com pointing at:
#   org/user:  ziloris-project
#   repo:      auther-backend-sdk
#   workflow:  release.yml
# Requires npm >= 11.5.1 and Node >= 22.14 (both ensured below) and the
# id-token: write permission.

name: Release (node)

on:
  push:
    branches: [main]
    paths: ['node/**']
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents:  read
  id-token:  write

jobs:
  publish-node:
    name: Publish @auther-sdk/node
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: node/package-lock.json

      # OIDC Trusted Publishing needs npm >= 11.5.1; Node 22 ships npm 10.
      - name: Upgrade npm to OIDC-capable version
        run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      - run: npm run typecheck

      - name: Publish if version is new
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "ℹ️  $NAME@$VERSION already on npm — nothing to publish."
          else
            echo "📦 Publishing $NAME@$VERSION via OIDC trusted publishing"
            npm publish --provenance --access public
          fi
        env:
          NPM_CONFIG_PROVENANCE: 'true'
