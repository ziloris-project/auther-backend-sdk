# Release the Node SDK to npm.
#
# Model (single package per language, so no changesets): the version in
# node/package.json is the source of truth. On every push to main that
# touches node/**, this workflow builds and — if that exact version is
# not already on the registry — publishes it with sigstore provenance.
#
# So a release is: bump node/package.json version in a PR, merge it. A
# merge that doesn't change the version republishes nothing (npm view
# finds it and the step skips). No `npm publish` ever runs from a laptop.
#
# Required secrets:
#   - NPM_TOKEN — automation token with publish access to @auther-sdk.
#
# Required permissions: id-token write (provenance), contents read.

name: Release (node)

on:
  push:
    branches: [main]
    paths: ['node/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents:  read
  id-token:  write

jobs:
  publish-node:
    name: Publish @auther-sdk/node
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: node/package-lock.json

      # npm 11.5.1+ routes the publish through the GitHub OIDC trusted
      # publisher when one is configured on npmjs.com; otherwise NPM_TOKEN
      # authorises the write. Either way provenance is attached.
      - name: Upgrade npm to OIDC-capable version
        run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      - run: npm run typecheck

      - name: Publish if version is new
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "ℹ️  $NAME@$VERSION already on npm — nothing to publish."
          else
            echo "📦 Publishing $NAME@$VERSION"
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN:       ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
